name: Build Windows EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build with PyInstaller
      run: |
        pyinstaller --noconfirm --clean --windowed --onefile --name "ProfitHelper" --icon assets/app_icon.ico --add-data "assets;assets" main.py

    - name: Create Zip Archive
      run: |
         powershell Compress-Archive -Path "dist\ProfitHelper.exe" -DestinationPath "ProfitHelper_Windows_v1.0.zip"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: BusinessHelper_Windows
        path: ProfitHelper_Windows_v1.0.zip
